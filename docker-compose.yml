services:
  prism-pipe:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - prism-data:/app/data
    restart: unless-stopped

volumes:
  prism-data:
