{{- if and .Values.secretEnv (not .Values.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "prism-pipe.fullname" . }}-secret
  labels:
    {{- include "prism-pipe.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.secretEnv }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
