# Compatibility CI matrix
# Tests prism-pipe across OS, Node version, and architecture combinations.

name: Compatibility

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']
        # Note: arm64 runners are limited. Use self-hosted for full arm64 coverage.
        # GitHub-hosted arm64: macos-latest (Apple Silicon), ubuntu-24.04-arm (preview)
        include:
          # Explicit arm64 on macOS (Apple Silicon)
          - os: macos-latest
            node: '20'
            arch: arm64
          - os: macos-latest
            node: '22'
            arch: arm64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / Node ${{ matrix.node }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify CLI boots
        run: |
          timeout 5 node dist/cli/index.js --help || true
        shell: bash

  docker-build:
    runs-on: ubuntu-latest
    name: Docker multi-arch build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: prism-pipe:test

  alpine-test:
    runs-on: ubuntu-latest
    name: Alpine (musl) compatibility
    steps:
      - uses: actions/checkout@v4

      - name: Test on Alpine
        run: |
          docker run --rm -v $PWD:/app -w /app node:20-alpine sh -c "
            apk add --no-cache python3 make g++ &&
            npm ci &&
            npm run build &&
            npm test
          "
