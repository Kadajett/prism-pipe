port: 3100
logLevel: info
requestTimeout: 300000

providers:
  mercury:
    name: mercury
    baseUrl: https://api.inceptionlabs.ai
    apiKey: ${INCEPTION_API_KEY}
    format: openai

  opus:
    name: opus
    baseUrl: https://api.anthropic.com
    apiKey: ${ANTHROPIC_API_KEY}
    format: anthropic

# ─── Routes ───

routes:
  # Direct Mercury passthrough (used by prism_mercury sessions)
  - path: /v1/chat/completions
    providers: [mercury]
    pipeline: [log-request, transform-format]

  # Composition chain: Opus plans → Mercury executes → Opus reviews
  # Triggered by model="opus-mercury-opus" or via /v1/chain/think-execute-review
  - path: /v1/chain/think-execute-review
    models: [opus-mercury-opus]
    compose:
      type: chain
      steps:
        - name: planner
          provider: opus
          model: claude-opus-4-6
          systemPrompt: |
            You are a senior software architect. Your job is to PLAN, not code.
            
            Given the user's task, produce a clear, ordered plan with:
            1. What files need to be read first (for context)
            2. What changes need to be made (specific files, functions, line-level detail)
            3. What the success criteria are (how to verify it works)
            4. Anti-patterns to avoid
            
            Be specific about file paths relative to the workspace root.
            Do NOT write code — just plan. The executor will implement.
          inputTransform: "{{original.lastUserMessage}}"
          timeout: 60000

        - name: executor
          provider: mercury
          model: mercury-2
          systemPrompt: |
            You are a fast, precise code executor. You receive a plan from an architect.
            
            PLAN:
            {{steps.planner.content}}
            
            Execute EXACTLY what the plan says. Write complete, working code.
            For each file change, output the COMPLETE file content with clear markers:
            
            === FILE: path/to/file.ts ===
            (complete file content here)
            === END FILE ===
            
            Do not deviate from the plan. Do not add features not in the plan.
            Be precise with imports, types, and function signatures.
          inputTransform: "Execute this plan:\n\n{{steps.planner.content}}\n\nOriginal task: {{original.lastUserMessage}}"
          timeout: 60000

        - name: reviewer
          provider: opus
          model: claude-opus-4-6
          systemPrompt: |
            You are a senior code reviewer. You have:
            1. The original task
            2. The architect's plan
            3. The executor's implementation
            
            Review for: correctness, completeness, edge cases, security, style.
            
            If the implementation is GOOD:
            - Summarize what was done
            - Note any minor suggestions
            
            If the implementation has ISSUES:
            - List each issue clearly
            - Specify what needs to change
            - Include "NEEDS_REVISION" in your response if changes are required
          inputTransform: |
            ## Original Task
            {{original.lastUserMessage}}
            
            ## Architect Plan
            {{steps.planner.content}}
            
            ## Executor Implementation
            {{steps.executor.content}}
            
            Review the implementation against the plan and original task.
          timeout: 60000

  # Quick chain: Mercury thinks → Mercury executes (no Opus, faster/cheaper)
  - path: /v1/chain/fast-think
    compose:
      type: chain
      steps:
        - name: thinker
          provider: mercury
          model: mercury-2
          systemPrompt: |
            Think step by step about how to solve this task.
            List the key considerations, potential issues, and your approach.
            Do NOT write the final answer yet — just think through it.
          inputTransform: "Think through this problem step by step:\n\n{{original.lastUserMessage}}"
          timeout: 30000

        - name: executor
          provider: mercury
          model: mercury-2
          systemPrompt: |
            You previously thought through this problem. Now execute.
            
            Your thinking:
            {{steps.thinker.content}}
            
            Now produce the final, complete answer.
          inputTransform: "Based on your analysis:\n{{steps.thinker.content}}\n\nNow produce the final answer for: {{original.lastUserMessage}}"
          timeout: 30000
