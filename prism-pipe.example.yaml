# Prism Pipe Configuration
# Copy to prism-pipe.yaml and customize.
# All settings have sane defaults — you can start with just env vars.

# Server port (default: 3000, override with PORT env var)
port: 3000

# Log level: trace | debug | info | warn | error (override with LOG_LEVEL)
logLevel: info

# Request timeout in ms (default: 120000 = 2 minutes)
requestTimeout: 120000

# Providers — auto-detected from env vars if omitted:
#   OPENAI_API_KEY    → openai provider
#   ANTHROPIC_API_KEY → anthropic provider
#
# providers:
#   openai:
#     baseUrl: https://api.openai.com
#     apiKey: ${OPENAI_API_KEY}
#     defaultModel: gpt-4o
#   anthropic:
#     baseUrl: https://api.anthropic.com
#     apiKey: ${ANTHROPIC_API_KEY}
#     defaultModel: claude-sonnet-4-20250514
#   local:
#     baseUrl: http://localhost:11434
#     apiKey: ollama

# Routes — default route proxies /v1/chat/completions
# routes:
#   - path: /v1/chat/completions
#     providers: [openai, anthropic]  # fallback order
#     pipeline: [log-request, transform-format]
#   - path: /v1/smart
#     providers: [anthropic]
#     systemPrompt: "Think step by step."

# Example: Anthropic-first route with system prompt
#   - path: /v1/smart
#     providers:
#       - anthropic
#       - openai
#     systemPrompt: "You are a helpful AI assistant."
#     pipeline:
#       - log-request
#       - inject-system
#       - transform-format

# Rate limiting — set RATE_LIMIT_RPM env var (default: 60 req/min)
# Auth — set PRISM_API_KEYS env var (comma-separated) to enable
# Store — defaults to SQLite at ./data/prism-pipe.db
#   Set STORE_TYPE=memory for in-memory (testing/edge)
