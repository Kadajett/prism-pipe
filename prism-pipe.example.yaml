# Prism Pipe Configuration
# Copy to prism-pipe.yaml and customize

port: 3000
logLevel: info
requestTimeout: 120000  # 120 seconds

# Provider configuration
# API keys can use ${VAR} for environment variable interpolation
providers:
  openai:
    baseUrl: https://api.openai.com
    apiKey: ${OPENAI_API_KEY}
    defaultModel: gpt-4o

  anthropic:
    baseUrl: https://api.anthropic.com
    apiKey: ${ANTHROPIC_API_KEY}
    defaultModel: claude-sonnet-4-20250514

# Route configuration
# Each route maps a path to a provider chain and pipeline
routes:
  - path: /v1/chat/completions
    # Providers are tried in order (fallback chain)
    providers:
      - openai
      - anthropic
    # Pipeline middleware to run (in order)
    pipeline:
      - log-request
      - transform-format

